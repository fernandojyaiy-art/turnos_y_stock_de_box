<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Turno</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-bloque { max-width: 480px; }
        .seccion { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--borde); }
        .radio-grupo { display: flex; gap: 16px; margin-top: 6px; }
        .radio-grupo label { font-weight: normal; font-size: 0.9em; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .saldo-info { background: var(--bg); border: 1px solid var(--borde); padding: 10px 14px; border-radius: 4px; font-size: 0.88em; color: var(--texto-suave); margin-top: 8px; }
        .info-cliente { background: var(--bg); border: 1px solid var(--borde); padding: 12px 14px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9em; }
        .acciones { display: flex; gap: 10px; margin-top: 24px; }
        textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--borde); border-radius: var(--radio); font-size: 0.9em; font-family: inherit; resize: vertical; min-height: 80px; }
        textarea:focus { outline: none; border-color: var(--acento); }
    </style>
</head>
<body>

<nav>
    <div class="links">
        <a href="/">← Volver a la agenda</a>
    </div>
</nav>

<h1>Editar turno</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<div class="info-cliente">
    <strong>{{ turno.cliente.nombre }} {{ turno.cliente.apellido }}</strong>
    <form class="form-inline" action="/clientes/{{ turno.cliente.id }}/editar" method="post" style="margin-top:10px;">
        <div>
            <label style="font-size:0.78em; font-weight:600; color:var(--texto-suave); text-transform:uppercase; display:block; margin-bottom:4px;">Telefono</label>
            <input type="text" name="telefono" value="{{ turno.cliente.telefono or '' }}" placeholder="Ej: 1122334455">
        </div>
        <input type="hidden" name="tipo_piel" value="{{ turno.cliente.tipo_piel or '' }}">
        <div style="align-self:flex-end;">
            <button type="submit" class="btn-secundario">Guardar telefono</button>
        </div>
    </form>
</div>

<form class="form-bloque" action="/turnos/{{ turno.id }}/editar" method="post">

    <label>Fecha</label>
    <input type="date" name="fecha" value="{{ turno.fecha }}" required>

    <label>Hora</label>
    <input type="time" name="hora" value="{{ turno.hora_inicio.strftime('%H:%M') }}" required>

    <label>Profesional</label>
    <select name="profesional_id" required>
        {% for p in profesionales %}
            <option value="{{ p.id }}" {{ "selected" if turno.profesional_id == p.id }}>{{ p.nombre }}</option>
        {% endfor %}
    </select>

    <label>Box</label>
    <select name="box_id" required>
        {% for b in boxes %}
            <option value="{{ b.id }}" {{ "selected" if turno.box_id == b.id }}>{{ b.nombre }}</option>
        {% endfor %}
    </select>

    <label>Servicio</label>
    <select name="servicio_id" id="servicio">
        {% for s in servicios %}
            <option value="{{ s.id }}"
                data-precio-tarjeta="{{ s.precio_tarjeta }}"
                data-precio-contado="{{ s.precio_contado }}"
                {{ "selected" if turno.servicio_id == s.id }}>
                {{ s.nombre }} ({{ s.duracion_min }} min)
            </option>
        {% endfor %}
    </select>

    <div class="seccion">
        <label>Descripcion del tratamiento</label>
        <textarea name="descripcion" placeholder="Ej: Se realizó limpieza profunda con extracción. Piel con tendencia a puntos negros en zona T. Se aplicó ampolla vitamina C...">{{ turno.descripcion or '' }}</textarea>
    </div>

    <div class="seccion">
        <label>Recomendación de productos / rutina</label>
        <textarea name="recomendacion" placeholder="Ej: Sérum Libra vitamina C de noche. Hidratante Libra piel mixta. Repetir en 21 días...">{{ turno.recomendacion or '' }}</textarea>
    </div>

    <div class="seccion">
        <label>Estado</label>
        <div class="radio-grupo">
            <label>
                <input type="radio" name="confirmado" value="false" {{ "checked" if not turno.confirmado }}>
                Pendiente
            </label>
            <label>
                <input type="radio" name="confirmado" value="true" {{ "checked" if turno.confirmado }}>
                Confirmado (con seña)
            </label>
        </div>

        <div id="seña-campos" style="margin-top:12px; {{ 'display:none' if not turno.confirmado else '' }}">
            <label>Monto de seña</label>
            <input type="number" name="monto_seña" value="{{ turno.monto_seña or 15000 }}" id="monto-seña">
            <div class="saldo-info" id="saldo-info"></div>
        </div>
    </div>

    <div class="seccion">
        <label>Forma de pago del saldo</label>
        <div class="radio-grupo">
            <label>
                <input type="radio" name="forma_pago" value="tarjeta" {{ "checked" if turno.forma_pago != "efectivo" }}>
                Tarjeta / QR / Transferencia
            </label>
            <label>
                <input type="radio" name="forma_pago" value="efectivo" {{ "checked" if turno.forma_pago == "efectivo" }}>
                Efectivo
            </label>
        </div>
        <div class="saldo-info" id="precio-info" style="margin-top:8px;"></div>
    </div>

    <div class="acciones">
        <button type="submit" class="btn-destacado">Guardar cambios</button>
        <a href="/turnos/{{ turno.id }}/eliminar?fecha={{ turno.fecha }}"
           onclick="return confirm('Eliminar este turno?')"
           class="btn-eliminar">Eliminar turno</a>
    </div>

</form>

<script>
function precioActual() {
    const select = document.getElementById("servicio");
    const opt = select.options[select.selectedIndex];
    const formaPago = document.querySelector('input[name="forma_pago"]:checked').value;
    return formaPago === "efectivo"
        ? parseFloat(opt.getAttribute("data-precio-contado"))
        : parseFloat(opt.getAttribute("data-precio-tarjeta"));
}

function formatPeso(n) {
    return "$" + n.toLocaleString("es-AR", { maximumFractionDigits: 0 });
}

function actualizarInfo() {
    const precio = precioActual();
    const seña = parseFloat(document.getElementById("monto-seña").value) || 0;
    const confirmado = document.querySelector('input[name="confirmado"]:checked').value === "true";
    const formaPago = document.querySelector('input[name="forma_pago"]:checked').value;

    document.getElementById("precio-info").textContent =
        `Precio ${formaPago === "efectivo" ? "efectivo" : "tarjeta/QR"}: ${formatPeso(precio)}`;

    document.getElementById("seña-campos").style.display = confirmado ? "block" : "none";

    if (confirmado) {
        const saldo = precio - seña;
        document.getElementById("saldo-info").textContent =
            `Seña: ${formatPeso(seña)} — Saldo a cobrar cuando venga: ${formatPeso(saldo)}`;
    }
}

document.querySelectorAll('input[name="confirmado"]').forEach(r => r.addEventListener("change", actualizarInfo));
document.querySelectorAll('input[name="forma_pago"]').forEach(r => r.addEventListener("change", actualizarInfo));
document.getElementById("servicio").addEventListener("change", actualizarInfo);
document.getElementById("monto-seña").addEventListener("input", actualizarInfo);

actualizarInfo();
</script>

</body>
</html>
