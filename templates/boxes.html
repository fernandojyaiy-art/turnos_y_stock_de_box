<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Boxes</title>
     <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { padding: 6px; margin-right: 8px; }
        button { padding: 6px 14px; cursor: pointer; }
        ul { margin-top: 20px; padding: 0; list-style: none; }
        li { padding: 10px; border: 1px solid #ccc; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<a href="/">← Volver a la agenda</a>

<h2>Boxes</h2>

<form action="/boxes/crear" method="post">
    <input type="text" name="nombre" placeholder="Nombre del box" required>
    <button type="submit">Agregar</button>
</form>

<ul>
    {% for b in boxes %}
    <li>
        <span>{{ b.nombre }}</span>
        <a href="/boxes/eliminar/{{ b.id }}" onclick="return confirm('¿Eliminar este box?')">Eliminar</a>
    </li>
    {% endfor %}
</ul>

</body>
</html>
